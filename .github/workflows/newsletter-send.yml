# Pulso Vigente — ENVÍO. Trigger = merge de un número a main (sin cron).
name: Newsletter send

on:
  push:
    branches: [main]
    paths:
      - 'newsletter/issues/**'
  workflow_dispatch:
    inputs:
      issue:
        description: 'Ruta al número (ej. newsletter/issues/2026-06-001.md)'
        required: true

concurrency:
  group: newsletter-send
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: newsletter/requirements.txt

      - name: Install deps
        run: pip install -r newsletter/requirements.txt

      - name: Determinar números a enviar
        id: pick
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "files=${{ github.event.inputs.issue }}" >> "$GITHUB_OUTPUT"
          else
            FILES=$(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" -- 'newsletter/issues/*.md' | tr '\n' ' ')
            echo "files=${FILES}" >> "$GITHUB_OUTPUT"
          fi

      - name: Enviar vía Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_PLUS: ${{ vars.RESEND_AUDIENCE_PLUS }}
          RESEND_AUDIENCE_FREE: ${{ vars.RESEND_AUDIENCE_FREE }}
          NEWSLETTER_FROM: ${{ vars.NEWSLETTER_FROM }}
        run: |
          set -euo pipefail
          if [ -z "${RESEND_API_KEY:-}" ]; then
            echo "RESEND_API_KEY no configurado — envío omitido (sin error)."; exit 0
          fi
          FILES="${{ steps.pick.outputs.files }}"
          if [ -z "${FILES// }" ]; then
            echo "Sin issues nuevos en este push — nada que enviar."
            exit 0
          fi
          for f in $FILES; do
            [ -z "$f" ] && continue
            echo "→ Enviando $f (requiere approved: true salvo FORCE_SEND)"
            python newsletter/send.py "$f"
          done
