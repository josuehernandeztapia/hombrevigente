# Pulso → SSOT: exporta bridges tipo A y abre PR a monografías.
# Separado del knowledge loop Q&A (rag-bot-process-promotions.yml).
name: Newsletter editorial bridge

on:
  push:
    branches: [main]
    paths:
      - 'newsletter/issues/**'
  workflow_dispatch:
    inputs:
      issue:
        description: 'Ruta al issue (ej. newsletter/issues/2026-06-001.md); vacío = diff del push'
        required: false
        default: ''

concurrency:
  group: newsletter-editorial-bridge
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            newsletter/requirements.txt
            rag-bot/requirements-rag-ci.txt

      - name: Install deps
        run: |
          pip install -r newsletter/requirements.txt
          pip install -r rag-bot/requirements-rag-ci.txt

      - name: Determinar issues a exportar
        id: pick
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.issue }}" ]; then
            echo "files=${{ github.event.inputs.issue }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            FILES=$(git diff --name-only --diff-filter=AM "${{ github.event.before }}" "${{ github.sha }}" -- 'newsletter/issues/*.md' | tr '\n' ' ')
            echo "files=${FILES}" >> "$GITHUB_OUTPUT"
          else
            echo "files=" >> "$GITHUB_OUTPUT"
          fi

      - name: Export bridges tipo A
        id: export
        run: |
          set -euo pipefail
          FILES="${{ steps.pick.outputs.files }}"
          if [ -z "${FILES// }" ]; then
            echo "No issue files — skip export."
            echo "pending_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for f in $FILES; do
            [ -f "$f" ] || continue
            python newsletter/bridge_export.py --issue "$f"
          done
          PENDING=$(python3 -c "import json; from pathlib import Path; p=Path('rag-bot/data/editorial-bridge-pending.json'); print(len(json.loads(p.read_text())) if p.exists() else 0)")
          echo "pending_count=${PENDING}" >> "$GITHUB_OUTPUT"

      - name: Aplicar patches a monografías
        if: steps.export.outputs.pending_count != '0'
        working-directory: rag-bot
        run: python3 scripts/process_editorial_bridge.py

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            git status --porcelain
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Abrir PR con patches SSOT
        if: steps.diff.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat(rag-bot): bridge editorial Pulso → monografías SSOT"
          title: "feat(rag-bot): bridge editorial Pulso → SSOT"
          body: |
            Auto-generated desde `newsletter-editorial-bridge.yml`.

            Flujo:
            1. `bridge_export.py` leyó tabla **Editorial bridge** del issue Pulso
            2. `process_editorial_bridge.py` aplicó entradas **tipo A** a monografías

            **No incluye** knowledge loop Q&A (`knowledge-promotions-pending.json`).

            Review:
            1. Verifica tono SSOT (optimización, sin diagnóstico)
            2. Verifica nivel E y PMID/DOI
            3. Merge → `rag-bot-nightly.yml` re-embede
          branch: rag-bot/editorial-bridge-${{ github.run_number }}
          delete-branch: true
          labels: |
            automated
            editorial-bridge
            rag-bot
            newsletter