# Carril AUTO — publica orgánico (bajo riesgo, sin claims) vía Ayrshare, SIN aprobación humana.
name: Social auto

on:
  schedule:
    - cron: '0 16 * * 3'   # miércoles 16:00 UTC (meme/frase del miércoles)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: social-auto
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: newsletter/requirements.txt
      - run: pip install -r newsletter/requirements.txt

      - name: Publicar posts due del carril AUTO
        env:
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${AYRSHARE_API_KEY:-}" ]; then
            echo "AYRSHARE_API_KEY no configurado — nada que publicar."; exit 0
          fi
          python newsletter/publish.py --due

      - name: Commit marcadores .posted
        run: |
          set -euo pipefail
          git config user.name "pulso-vigente-bot"
          git config user.email "bot@hombrevigente.com"
          git add 'newsletter/social/queue/*.posted' 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin marcadores nuevos."
          else
            git commit -m "chore(social): marcar posts auto publicados"
            git push
          fi
