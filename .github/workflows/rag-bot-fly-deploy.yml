name: RAG bot Fly deploy

on:
  push:
    branches: [main]
    paths:
      - 'rag-bot/**'
      - '.github/workflows/rag-bot-fly-deploy.yml'
  workflow_dispatch:

concurrency:
  group: rag-bot-fly-deploy
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-bot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: rag-bot/requirements-rag-ci.txt

      - name: Install CI deps
        run: pip install -r requirements-rag-ci.txt

      - name: Unit + golden gates
        run: |
          python test_rag_local.py
          python test_observability.py
          python test_pgvector_scaffold.py
          python golden_runner.py --gates-only

  deploy:
    name: Deploy hv-rag-api
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-bot
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --wait-timeout 600
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}