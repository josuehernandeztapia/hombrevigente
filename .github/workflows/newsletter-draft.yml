# Pulso Vigente — pipeline semanal Fase A: harvest → compose IA → rehearsal → PR.
# NUNCA envía. El humano lee el PR y dialoga antes de merge a main.
name: Newsletter draft

on:
  schedule:
    - cron: '0 14 * * 4'   # jueves 14:00 UTC
  workflow_dispatch:

concurrency:
  group: newsletter-draft
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    env:
      PULSO_MODE: shadow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: newsletter/requirements.txt

      - name: Install deps
        run: pip install -r newsletter/requirements.txt

      - name: Cosechar candidatos verificados (Europe PMC)
        id: harvest
        run: python newsletter/harvest.py --days 14 --per-topic 4

      - name: Calcular próximo número
        id: meta
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          LAST=$(ls newsletter/issues/*.md 2>/dev/null | sed -E 's/.*-([0-9]+)\.md/\1/' | sort -n | tail -1 || echo "000")
          NEXT=$(printf "%03d" $((10#${LAST:-000} + 1)))
          MONTH=$(date -u +%Y-%m)
          OUT="newsletter/issues/${MONTH}-${NEXT}.md"
          CAND="${{ steps.harvest.outputs.candidates }}"
          if [ -z "${CAND}" ]; then
            CAND=$(ls -t newsletter/drafts/candidates-*.md 2>/dev/null | head -1)
          fi
          echo "out=${OUT}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "fecha=${DATE}" >> "$GITHUB_OUTPUT"
          echo "candidates=${CAND}" >> "$GITHUB_OUTPUT"

      - name: Redactar número (IA + validación harvest)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python newsletter/draft_compose.py \
            --candidates "${{ steps.meta.outputs.candidates }}" \
            --out "${{ steps.meta.outputs.out }}" \
            --numero "${{ steps.meta.outputs.next }}" \
            --fecha "${{ steps.meta.outputs.fecha }}"

      - name: Ensayo shadow + post-mortem
        id: rehearsal
        continue-on-error: true
        run: |
          set +e
          python newsletter/rehearsal.py "${{ steps.meta.outputs.out }}"
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          PM=$(ls newsletter/runs/*-postmortem.md 2>/dev/null | head -1 || true)
          if [ -n "${PM}" ]; then
            cp "${PM}" "newsletter/drafts/postmortem-${{ steps.meta.outputs.next }}.md"
          fi

      - name: Abrir PR con borrador auto-redactado
        uses: peter-evans/create-pull-request@v6
        with:
          branch: newsletter/draft-${{ steps.meta.outputs.next }}
          title: "Pulso Vigente Nº${{ steps.meta.outputs.next }} — borrador auto"
          commit-message: "draft(newsletter): número ${{ steps.meta.outputs.next }} auto-compose"
          body: |
            ## Pulso Vigente Nº${{ steps.meta.outputs.next }} — generado automáticamente

            Pipeline Fase A:
            1. `harvest.py` → candidatos Europe PMC
            2. `draft_compose.py` → redacción IA (o fallback) solo desde harvest
            3. `rehearsal.py` → post-mortem shadow (sin envío)

            **Tu rol:** lee el issue + `newsletter/runs/*-postmortem.md` en el PR, dialoga cambios con Grok/peer, edita el issue en esta rama si hace falta.

            - Regla de hierro: fuentes solo del harvest (validado en compose).
            - Merge a `main` **solo cuando quieras enviar** → `newsletter-send.yml`.
            - Bridge SSOT al merge → `newsletter-editorial-bridge.yml`.

            Rehearsal exit: ${{ steps.rehearsal.outputs.exit_code == '0' && '✅' || '⚠️ revisar warnings' }}
          labels: newsletter, draft, auto-compose