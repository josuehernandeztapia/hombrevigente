# Pulso Vigente — ASSETS. Genera hero IA + social pack de un número y los commitea a la rama.
# Manual (workflow_dispatch) — humano en el loop antes de publicar.
name: Newsletter assets

on:
  workflow_dispatch:
    inputs:
      issue:
        description: 'Ruta al número (ej. newsletter/issues/2026-06-001.md)'
        required: true

permissions:
  contents: write

concurrency:
  group: newsletter-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: newsletter/requirements.txt
      - run: pip install -r newsletter/requirements.txt

      - name: Generar social pack
        run: python newsletter/social.py "${{ github.event.inputs.issue }}"

      - name: Generar hero IA (degrada si no hay OPENAI_API_KEY)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python newsletter/image.py "${{ github.event.inputs.issue }}"

      - name: Commit assets a la rama
        run: |
          set -euo pipefail
          git config user.name "pulso-vigente-bot"
          git config user.email "bot@hombrevigente.com"
          git add newsletter/social newsletter/assets 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Sin cambios que commitear."
          else
            git commit -m "chore(newsletter): assets + social pack para ${{ github.event.inputs.issue }}"
            git push
          fi
