# HV RAG — regresión rápida en cada PR (sin API key)
name: RAG bot CI

on:
  pull_request:
    paths:
      - 'rag-bot/**'
      - '.github/workflows/rag-bot-ci.yml'
  push:
    branches: [main]
    paths:
      - 'rag-bot/**'
      - '.github/workflows/rag-bot-ci.yml'

concurrency:
  group: rag-bot-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates-and-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: rag-bot/requirements-rag-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-rag-ci.txt

      - name: Unit tests
        run: |
          python test_rag_local.py
          python test_observability.py

      - name: Extended unit suites (no API key needed)
        # Previously these existed but no CI ran them. config/frozen_context/mvp0_lib/
        # beta_state are pure unit; api_rag/newsletter_approval use FastAPI TestClient
        # (no real OpenAI/Resend calls). Trajectory + test_rag (live retrieval) run in nightly.
        run: |
          python -m pytest -q -p no:cacheprovider \
            test_config.py \
            test_frozen_context.py \
            test_mvp0_lib.py \
            test_beta_state.py \
            test_api_rag.py \
            test_newsletter_approval.py \
            test_c1_idempotency.py \
            test_whatsapp_channel.py \
            test_onboarding_flow.py

      - name: Golden set (gates-only)
        run: python golden_runner.py --gates-only

      - name: Pgvector scaffold tests
        run: python test_pgvector_scaffold.py

  proactive-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: rag-bot/requirements-rag-nightly.txt

      - name: Install dependencies (nightly for proactive scripts)
        run: pip install -r requirements-rag-nightly.txt

      - name: Proactive dry cycle smoke (signals + actions + health gate)
        run: |
          python scripts/run_proactive_nightly.py --dry-run --no-calibration --sample 5
          echo "Dry proactive cycle OK (respects is_healthy + feature flags in code)"

      - name: Calibration smoke (Aprende drift detection)
        run: |
          python scripts/calibrate_proactive.py --sample 5
          echo "Calibration OK (now includes message/output drift per Guía)"

      - name: Enforce proactive quality gate (health + drift) for 'se corrige' in CI
        run: |
          python -c '
          import json
          from pathlib import Path
          from action_handler import compute_proactive_health_score
          hs = compute_proactive_health_score()
          score = hs["score"]
          is_healthy = hs.get("is_healthy")
          print(f"CI Proactive Health: score={score} is_healthy={is_healthy}")
          cal_path = Path("data/proactive_calibration.json")
          drift = {}
          if cal_path.exists():
              cal = json.loads(cal_path.read_text())
              drift = cal.get("drift", {})
          print("CI Calibration drift:", {k: drift.get(k) for k in ["added", "removed", "message_changes", "significant_message_drift", "avg_message_similarity"] if k in drift})
          if score < 50:
              print("::error::Proactive health score too low in CI (self-correction gate)")
              exit(1)
          if drift.get("significant_message_drift", 0) > 3:
              print("::warning::High message drift detected in CI calibration")
          print("Proactive CI quality gate passed (health + low drift)")
          '

      - name: Proactive golden regression (deterministic actions for sample signals)
        run: |
          python scripts/proactive_golden.py
          echo "Proactive golden regression passed (via scripts/proactive_golden.py; low_progress may include optional RAG evidence per Capa 4 integration)"