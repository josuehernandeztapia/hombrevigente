# Aprobación humana Pulso: comentario OK → merge + envío · otro texto → revisión + nuevo email.
name: Newsletter approval

on:
  issue_comment:
    types: [created]
  repository_dispatch:
    types: [pulso-approval]
  workflow_dispatch:
    inputs:
      issue_path:
        description: 'Ruta al número (ej. newsletter/issues/2026-06-002.md)'
        required: true
      action:
        description: 'approve | revise'
        required: true
      corrections:
        description: 'Texto de correcciones (si action=revise)'
        required: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  handle:
    # issue_comment no trae labels en el payload — filtramos por título
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      startsWith(github.event.issue.title, 'Aprobar Pulso')
    runs-on: ubuntu-latest
    steps:
      - name: Parsear comentario / dispatch
        id: parse
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_path=${{ github.event.inputs.issue_path }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.inputs.action }}" >> "$GITHUB_OUTPUT"
            echo "corrections<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.inputs.corrections }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "issue_path=${{ github.event.client_payload.issue_path }}" >> "$GITHUB_OUTPUT"
            echo "action=${{ github.event.client_payload.action }}" >> "$GITHUB_OUTPUT"
            echo "corrections<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ github.event.client_payload.corrections }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BODY="${{ github.event.comment.body }}"
          # primera línea útil (email-reply suele traer citas abajo)
          FIRST=$(printf '%s' "$BODY" | sed '/^>/d;/^On /d' | head -1 | tr '[:upper:]' '[:lower:]' | xargs)
          ISSUE_BODY="${{ github.event.issue.body }}"
          FILE=$(echo "$ISSUE_BODY" | sed -n 's/.*Archivo: `\([^`]*\)`.*/\1/p' | head -1)
          echo "issue_path=${FILE}" >> "$GITHUB_OUTPUT"
          if [ "$FIRST" = "ok" ] || [ "$FIRST" = "ok." ] || [ "$FIRST" = "aprobar" ] || [ "$FIRST" = "aprobar." ]; then
            echo "action=approve" >> "$GITHUB_OUTPUT"
          else
            echo "action=revise" >> "$GITHUB_OUTPUT"
            echo "corrections<<EOF" >> "$GITHUB_OUTPUT"
            printf '%s' "$BODY" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: newsletter/requirements.txt

      - name: Install deps
        run: pip install -r newsletter/requirements.txt

      - name: Checkout rama del borrador
        id: branch
        run: |
          set -euo pipefail
          FILE="${{ steps.parse.outputs.issue_path }}"
          NUM=$(basename "$FILE" .md | sed -E 's/.*-([0-9]+)$/\1/')
          BR="newsletter/draft-${NUM}"
          git fetch origin "$BR" || true
          if git show-ref --verify --quiet "refs/remotes/origin/${BR}"; then
            git checkout "$BR"
            git merge origin/main -X theirs -m "chore: sync main into draft for approval tooling" || true
            echo "branch=${BR}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Aplicar correcciones (revise)
        if: steps.parse.outputs.action == 'revise'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PULSO_COMPOSE_PROVIDER: auto
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM: ${{ vars.NEWSLETTER_FROM }}
          NEWSLETTER_APPROVAL_TO: ${{ vars.NEWSLETTER_APPROVAL_TO }}
          NEWSLETTER_APPROVAL_SECRET: ${{ secrets.NEWSLETTER_APPROVAL_SECRET }}
        run: |
          python newsletter/approval_revise.py \
            "${{ steps.parse.outputs.issue_path }}" \
            "${{ steps.parse.outputs.corrections }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.parse.outputs.issue_path }}"
          git commit -m "draft(newsletter): revisión editor Pulso" || true
          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Comentar revisión enviada
        if: steps.parse.outputs.action == 'revise'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✏️ Correcciones aplicadas. **Nuevo borrador enviado a tu correo.** Responde \`OK\` cuando esté listo."

      - name: Aprobar y marcar issue
        if: steps.parse.outputs.action == 'approve'
        run: |
          python newsletter/approval.py mark-approved "${{ steps.parse.outputs.issue_path }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.parse.outputs.issue_path }}"
          git commit -m "draft(newsletter): aprobado para envío Plus" || true
          git push origin "${{ steps.branch.outputs.branch }}"

      - name: Merge PR borrador
        if: steps.parse.outputs.action == 'approve' && steps.branch.outputs.branch != 'main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NUM=$(basename "${{ steps.parse.outputs.issue_path }}" .md | sed -E 's/.*-([0-9]+)$/\1/')
          PR=$(gh pr list --head "newsletter/draft-${NUM}" --json number -q '.[0].number' || true)
          if [ -n "${PR}" ]; then
            gh pr merge "$PR" --merge --delete-branch
          fi

      - name: Enviar a Plus (Resend)
        # El merge anterior usa GITHUB_TOKEN → NO dispara newsletter-send.yml
        # (GitHub no encadena workflows en pushes del token). Por eso enviamos
        # aquí directo. send.py gatea por approved:true (ya marcado arriba).
        if: steps.parse.outputs.action == 'approve'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_AUDIENCE_PLUS: ${{ vars.RESEND_AUDIENCE_PLUS }}
          RESEND_AUDIENCE_FREE: ${{ vars.RESEND_AUDIENCE_FREE }}
          NEWSLETTER_FROM: ${{ vars.NEWSLETTER_FROM }}
        run: |
          if [ -z "${RESEND_API_KEY:-}" ]; then
            echo "RESEND_API_KEY no configurado — envío omitido (sin error)."; exit 0
          fi
          python newsletter/send.py "${{ steps.parse.outputs.issue_path }}"

      - name: Cerrar issue aprobación
        if: steps.parse.outputs.action == 'approve' && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close "${{ github.event.issue.number }}" --comment "✅ Aprobado y enviado a audiencia Plus."

      - name: Cerrar issue aprobación (link email)
        if: steps.parse.outputs.action == 'approve' && github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NUM=$(python -c "import yaml,re; p='${{ steps.parse.outputs.issue_path }}'; m=re.match(r'^---\n(.*?)\n---', open(p).read(), re.S); print(yaml.safe_load(m.group(1)).get('approval_github_issue',''))")
          if [ -n "${NUM}" ]; then
            gh issue close "$NUM" --comment "✅ Aprobado por link en correo y enviado a audiencia Plus."
          fi