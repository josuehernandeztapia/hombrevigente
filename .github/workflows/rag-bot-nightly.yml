# HV RAG — evaluación completa nocturna (embed + retrieval + gates)
name: RAG bot nightly

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC diario
  push:
    branches: [main]
    paths:
      - 'rag-bot/knowledge_base/**'
      - 'rag-bot/docs/qa/golden-set-hv-rag.md'
      - 'rag-bot/data/golden-set-hv-rag.json'
  workflow_dispatch:

concurrency:
  group: rag-bot-nightly
  cancel-in-progress: false

jobs:
  golden-full:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rag-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: rag-bot/requirements-rag-nightly.txt

      - name: Install dependencies
        run: pip install -r requirements-rag-nightly.txt

      - name: Check OpenAI secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is required for nightly --full"
            exit 1
          fi

      - name: Build local embeddings index
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HV_DECISION_LOG_ENABLED: 'false'
        run: python embed_kb_local.py --source all

      - name: Golden set (full retrieval)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HV_DECISION_LOG_ENABLED: 'false'
        run: python golden_runner.py --full

      - name: Upload embeddings artifact (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: embeddings-local-debug
          path: rag-bot/knowledge_base/embeddings_local.json
          retention-days: 3