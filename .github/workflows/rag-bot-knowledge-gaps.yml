# HV Knowledge Loop — reporte semanal de gaps (patrón CMU extract-uncovered-questions)
name: RAG bot knowledge gaps

on:
  schedule:
    - cron: '0 16 * * 1'  # lunes 16:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: Ventana de días para el reporte
        required: false
        default: '7'

concurrency:
  group: rag-bot-knowledge-gaps
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: rag-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: rag-bot/requirements-rag-ci.txt

      - name: Install dependencies
        run: pip install -r requirements-rag-ci.txt

      - name: Generate gap report
        env:
          HV_RAG_API_URL: ${{ vars.HV_RAG_API_URL }}
          HV_ADMIN_PIN: ${{ secrets.HV_ADMIN_PIN }}
          GAP_DAYS: ${{ github.event.inputs.days || '7' }}
        run: python3 scripts/generate_knowledge_gaps_report.py --days "${GAP_DAYS}" --from-prod

      - name: Detect changes
        id: diff
        run: |
          shopt -s nullglob
          files=(docs/qa/knowledge-gaps-*.md)
          if [ ${#files[@]} -eq 0 ]; then
            echo "changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git status --porcelain "${files[@]}" | grep -q .; then
            echo "changes=true" >> $GITHUB_OUTPUT
            git status --porcelain docs/qa/
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with gap report
        if: steps.diff.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(rag-bot): reporte semanal knowledge gaps"
          title: "docs(rag-bot): knowledge gaps semanal"
          body: |
            Auto-generated PR from `rag-bot-knowledge-gaps.yml`.

            Reporte en `rag-bot/docs/qa/knowledge-gaps-*.md` con preguntas de baja confianza
            o escaladas en la ventana configurada.

            Siguiente paso: promover entradas válidas vía `POST /admin/knowledge/promote`.
          branch: rag-bot/knowledge-gaps-${{ github.run_number }}
          delete-branch: true
          labels: |
            automated
            knowledge-loop
            rag-bot