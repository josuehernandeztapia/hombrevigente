# Ensayo shadow del pipeline Pulso — valida flujo sin enviar ni publicar.
# Post-mortem: descarga artefactos y finetunea antes de merge a main.
name: Newsletter rehearsal (shadow)

on:
  workflow_dispatch:
    inputs:
      issue:
        description: 'Ruta al issue (ej. newsletter/issues/2026-06-001.md)'
        required: true
        default: 'newsletter/issues/2026-06-001.md'

permissions:
  contents: read

concurrency:
  group: newsletter-rehearsal
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    env:
      PULSO_MODE: shadow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: newsletter/requirements.txt

      - name: Install deps
        run: pip install -r newsletter/requirements.txt

      - name: Ensayo shadow + post-mortem
        id: rehearsal
        continue-on-error: true
        run: |
          set +e
          python newsletter/rehearsal.py "${{ github.event.inputs.issue }}"
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Subir artefactos post-mortem
        uses: actions/upload-artifact@v4
        with:
          name: pulso-postmortem-${{ github.run_number }}
          path: |
            newsletter/runs/*-postmortem.md
            newsletter/runs/*-preview.html
            newsletter/social/**/*
          if-no-files-found: warn

      - name: Resumen
        run: |
          echo "## Post-mortem Pulso (shadow)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f newsletter/runs/*-postmortem.md ]; then
            cat newsletter/runs/*-postmortem.md >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.rehearsal.outputs.exit_code }}" != "0" ]; then
            echo "::warning::Hay warnings en post-mortem — revisa antes de merge a main."
          fi