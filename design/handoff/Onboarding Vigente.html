<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hombre Vigente — Onboarding (7 pantallas)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #000; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  #root { min-height: 100vh; }

  @keyframes hvRise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .hv-rise { animation: hvRise .55s cubic-bezier(.16,.84,.44,1) both; }
  @keyframes hvScreen { from { opacity: 0; transform: translateY(8px) scale(.995); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .hv-screen { animation: hvScreen .4s ease both; }
  @keyframes hvScan { 0% { top: 0; opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
  .hv-scan { position: absolute; left: 0; right: 0; height: 36px; border-radius: 14px; filter: blur(2px); animation: hvScan 1.8s ease-in-out infinite; }
  @keyframes hvSpin { to { transform: rotate(360deg); } }
  .hv-spin { display: inline-block; animation: hvSpin .7s linear infinite; }
  @keyframes hvSheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .hv-sheet { animation: hvSheet .32s cubic-bezier(.16,.84,.44,1) both; }
  @keyframes hvBar { from { width: 0; } to { width: 100%; } }

  @media (prefers-reduced-motion: reduce) {
    .hv-rise, .hv-screen, .hv-sheet { animation: none !important; }
    .hv-scan { display: none; }
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">

    <rect width="100" height="100" fill="#08080A"/>

    <circle cx="50" cy="42" r="11" fill="none" stroke="#C6A06A" stroke-width="2.5"/>
    <text x="50" y="46" text-anchor="middle" font-family="monospace" font-size="9" fill="#C6A06A">68</text>
  </svg>
</template>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
